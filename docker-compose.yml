services:
  app:
    # Builda a imagem a partir do Dockerfile multi-stage.
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: ecommerce-recsys-api

    # Carrega variáveis locais sem hardcode no compose.
    env_file:
      - path: .env
        required: false

    ports:
      - "8000:8000"

    # Volumes usados para desenvolvimento com hot-reload.
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs

    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload

    # Valida se a API está respondendo dentro do container.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s